<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 페이지 – 참빛 수소수기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #3a4f30;
      --green-mid:   #5f7152;
      --green-light: #7a8d6a;
      --green-pale:  #c8d5b8;
      --green-bg:    #f4f5f0;
      --text-dark:   #1c2419;
      --text-mid:    #455045;
      --text-light:  #6b756b;
      --border:      #e0e6da;
      --white:       #ffffff;
      --radius:      14px;
      --shadow:      0 4px 20px rgba(0,0,0,0.07);
    }

    body {
      font-family: "Noto Sans KR", sans-serif;
      background: #f0f2ed;
      color: var(--text-dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Sidebar ---- */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #1e2a1a;
      color: rgba(255,255,255,0.90);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 200;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 22px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 20px;
    }

    .sidebar-logo-mark {
      font-size: 22px;
      color: var(--green-pale);
    }

    .sidebar-logo-text {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
    }

    .sidebar-logo-text small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      opacity: 0.55;
      margin-top: 2px;
    }

    .sidebar-nav {
      flex: 1;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 22px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.70);
      text-decoration: none;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: rgba(255,255,255,0.07);
      color: #fff;
      border-left-color: var(--green-pale);
    }

    .sidebar-nav a i {
      width: 18px;
      text-align: center;
      opacity: 0.75;
    }

    .sidebar-footer {
      padding: 18px 22px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    /* ---- Main ---- */
    .main-content {
      margin-left: 240px;
      flex: 1;
      padding: 32px;
      min-height: 100vh;
    }

    /* ---- Top Bar ---- */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .topbar h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-dark);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ---- Summary Cards ---- */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 28px;
    }

    .summary-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .summary-icon {
      width: 50px; height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .summary-icon.green  { background: rgba(95,113,82,0.12); color: var(--green-mid); }
    .summary-icon.blue   { background: rgba(74,144,217,0.12); color: #4a90d9; }
    .summary-icon.orange { background: rgba(224,123,60,0.12); color: #e07b3c; }
    .summary-icon.purple { background: rgba(150,100,200,0.12); color: #9664c8; }

    .summary-info strong {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1;
      margin-bottom: 5px;
    }

    .summary-info span {
      font-size: 13px;
      color: var(--text-light);
      font-weight: 500;
    }

    /* ---- Table Area ---- */
    .table-area {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .table-header h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .table-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--green-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 14px;
      color: var(--text-mid);
    }

    .search-box input {
      border: none;
      background: none;
      outline: none;
      font-size: 14px;
      color: var(--text-dark);
      font-family: inherit;
      width: 180px;
    }

    .search-box i { color: var(--text-light); }

    .filter-select {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-mid);
      background: var(--green-bg);
      cursor: pointer;
      outline: none;
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: var(--green-mid);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-refresh:hover { background: var(--green-dark); }

    /* ---- Data Table ---- */
    .data-table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead th {
      background: #f7f8f5;
      padding: 13px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9faf7; }

    tbody td {
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text-mid);
      vertical-align: middle;
    }

    .td-name {
      font-weight: 700;
      color: var(--text-dark);
    }

    .td-phone { font-family: monospace; font-size: 13px; }

    /* Status Badge */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-신규     { background: rgba(74,144,217,0.12); color: #2f7ec8; }
    .status-확인중   { background: rgba(224,166,60,0.12); color: #c87a10; }
    .status-상담완료 { background: rgba(95,113,82,0.12);  color: var(--green-mid); }
    .status-설치완료 { background: rgba(150,100,200,0.12); color: #7a42b8; }

    /* Ref Code */
    .ref-code {
      font-size: 12px;
      font-weight: 600;
      color: var(--green-mid);
      background: rgba(95,113,82,0.08);
      padding: 3px 9px;
      border-radius: 4px;
    }

    .ref-empty { color: var(--text-light); font-size: 13px; }

    /* Action buttons */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn-view   { background: rgba(74,144,217,0.10); color: #2f7ec8; }
    .btn-view:hover { background: rgba(74,144,217,0.20); }
    .btn-delete { background: rgba(224,90,75,0.10); color: #c84030; }
    .btn-delete:hover { background: rgba(224,90,75,0.20); }

    /* Pagination */
    .pagination {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-light);
    }

    .page-btns {
      display: flex;
      gap: 6px;
    }

    .page-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-mid);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: all 0.15s;
    }

    .page-btn:hover { background: var(--green-bg); }
    .page-btn.active { background: var(--green-mid); color: #fff; border-color: var(--green-mid); }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    /* Empty / Loading State */
    .state-box {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-light);
    }

    .state-box i {
      font-size: 40px;
      margin-bottom: 14px;
      opacity: 0.4;
      display: block;
    }

    .state-box p {
      font-size: 15px;
    }

    /* ---- Detail Modal ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.46);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--white);
      border-radius: 22px;
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
    }

    .modal-header {
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .modal-close {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--green-bg);
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover { background: var(--border); }

    .modal-body {
      padding: 24px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-item.full { grid-column: 1 / -1; }

    .detail-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .detail-value {
      font-size: 15px;
      color: var(--text-dark);
      font-weight: 500;
      word-break: break-all;
    }

    .detail-value.empty { color: var(--text-light); font-style: italic; }

    .modal-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 22px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Status Selector in Modal */
    .status-select-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .status-select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-dark);
      background: var(--green-bg);
      cursor: pointer;
      outline: none;
    }

    .btn-save-status {
      padding: 9px 18px;
      border-radius: 8px;
      background: var(--green-mid);
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-save-status:hover { background: var(--green-dark); }

    /* Memo textarea */
    .memo-area {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-dark);
      background: #fafaf8;
      resize: vertical;
      min-height: 90px;
      outline: none;
      margin-bottom: 8px;
    }

    .memo-area:focus {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(95,113,82,0.10);
    }

    /* Date */
    .td-date { font-size: 12px; color: var(--text-light); white-space: nowrap; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 20px 16px; }
      .summary-row { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .summary-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-mark">✦</span>
      <div class="sidebar-logo-text">
        참빛 수소수기
        <small>관리자 페이지</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="admin.html" class="active">
        <i class="fas fa-clipboard-list"></i>
        상담 신청 목록
      </a>
      <a href="index.html" target="_blank">
        <i class="fas fa-external-link-alt"></i>
        메인 사이트 보기
      </a>
    </nav>
    <div class="sidebar-footer">
      &copy; 2025 (주)트루라이트
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">

    <!-- Top Bar -->
    <div class="topbar">
      <h1><i class="fas fa-clipboard-list" style="color: var(--green-mid); margin-right:10px;"></i>상담 신청 관리</h1>
      <div class="topbar-right">
        <span id="lastUpdated" style="font-size:13px; color: var(--text-light);"></span>
        <button class="btn-refresh" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> 새로고침
        </button>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-row" id="summaryRow">
      <div class="summary-card">
        <div class="summary-icon green"><i class="fas fa-inbox"></i></div>
        <div class="summary-info">
          <strong id="countTotal">–</strong>
          <span>전체 신청</span>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon blue"><i class="fas fa-bell"></i></div>
        <div class="summary-info">
          <strong id="countNew">–</strong>
          <span>신규 신청</span>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon orange"><i class="fas fa-comments"></i></div>
        <div class="summary-info">
          <strong id="countInProgress">–</strong>
          <span>확인 중</span>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon purple"><i class="fas fa-check-circle"></i></div>
        <div class="summary-info">
          <strong id="countDone">–</strong>
          <span>완료</span>
        </div>
      </div>
    </div>

    <!-- Table Area -->
    <div class="table-area">
      <div class="table-header">
        <h2>신청 목록</h2>
        <div class="table-controls">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="이름, 연락처, 지역 검색...">
          </div>
          <select class="filter-select" id="statusFilter">
            <option value="">전체 상태</option>
            <option value="신규">신규</option>
            <option value="확인중">확인 중</option>
            <option value="상담완료">상담 완료</option>
            <option value="설치완료">설치 완료</option>
          </select>
          <select class="filter-select" id="typeFilter">
            <option value="">전체 유형</option>
            <option value="가정용 상담">가정용 상담</option>
            <option value="구독 상담">구독 상담</option>
            <option value="설치 상담">설치 상담</option>
            <option value="제품 문의">제품 문의</option>
          </select>
        </div>
      </div>

      <!-- Loading / Empty / Table -->
      <div id="tableLoading" class="state-box">
        <i class="fas fa-spinner fa-spin"></i>
        <p>데이터를 불러오는 중...</p>
      </div>

      <div id="tableEmpty" class="state-box" style="display:none;">
        <i class="fas fa-inbox"></i>
        <p>아직 신청 내역이 없습니다.</p>
      </div>

      <div class="data-table-wrap" id="tableWrap" style="display:none;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>이름</th>
              <th>연락처</th>
              <th>지역</th>
              <th>상담 유형</th>
              <th>설치 대상</th>
              <th>추천코드</th>
              <th>상태</th>
              <th>신청일시</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="pagination" style="display:none;">
        <span id="paginationInfo"></span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>

  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-user-circle" style="color:var(--green-mid); margin-right:8px;"></i>상담 신청 상세</h3>
      <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- 동적 삽입 -->
    </div>
  </div>
</div>

<script>
// =============================================
// Admin Page – Table API 연동
// =============================================

const PER_PAGE = 15;
let allData   = [];
let filtered  = [];
let currentPage = 1;
let searchTerm  = '';
let statusFilter = '';
let typeFilter   = '';

// ---- 데이터 로드 ----
async function loadData() {
  showLoading(true);
  try {
    // 전체 데이터 로드 (최대 500건)
    const res = await fetch('tables/consultations?limit=500&sort=created_at');
    if (!res.ok) throw new Error('Fetch error: ' + res.status);
    const json = await res.json();

    // 최신 순 정렬
    allData = (json.data || []).sort(function(a, b) {
      return (b.created_at || 0) - (a.created_at || 0);
    });

    updateSummary();
    applyFilter();

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      '마지막 업데이트: ' + now.toLocaleTimeString('ko-KR');

  } catch(err) {
    console.error(err);
    showLoading(false);
    document.getElementById('tableLoading').innerHTML =
      '<i class="fas fa-exclamation-triangle"></i><p>데이터 로드 실패. 다시 시도해 주세요.</p>';
  }
}

// ---- 요약 카드 업데이트 ----
function updateSummary() {
  const total      = allData.length;
  const countNew   = allData.filter(d => d.status === '신규').length;
  const countInProg = allData.filter(d => d.status === '확인중').length;
  const countDone  = allData.filter(d => d.status === '상담완료' || d.status === '설치완료').length;

  document.getElementById('countTotal').textContent     = total;
  document.getElementById('countNew').textContent       = countNew;
  document.getElementById('countInProgress').textContent = countInProg;
  document.getElementById('countDone').textContent       = countDone;
}

// ---- 필터 적용 ----
function applyFilter() {
  const q = searchTerm.toLowerCase();

  filtered = allData.filter(function(d) {
    const matchSearch =
      !q ||
      (d.name  && d.name.toLowerCase().includes(q))  ||
      (d.phone && d.phone.includes(q)) ||
      (d.region && d.region.toLowerCase().includes(q));

    const matchStatus = !statusFilter || d.status === statusFilter;
    const matchType   = !typeFilter   || d.consult_type === typeFilter;

    return matchSearch && matchStatus && matchType;
  });

  currentPage = 1;
  renderTable();
}

// ---- 테이블 렌더링 ----
function renderTable() {
  const tbody = document.getElementById('tableBody');
  const tableWrap = document.getElementById('tableWrap');
  const tableEmpty = document.getElementById('tableEmpty');
  const pagination = document.getElementById('pagination');

  showLoading(false);

  if (filtered.length === 0) {
    tableWrap.style.display  = 'none';
    tableEmpty.style.display = 'block';
    pagination.style.display = 'none';
    return;
  }

  tableEmpty.style.display = 'none';
  tableWrap.style.display  = 'block';

  const start = (currentPage - 1) * PER_PAGE;
  const end   = start + PER_PAGE;
  const pageData = filtered.slice(start, end);

  tbody.innerHTML = pageData.map(function(row, idx) {
    const date = row.created_at
      ? new Date(row.created_at).toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
      : '–';

    const statusClass = 'status-' + (row.status || '신규').replace(/\s/g, '');
    const refHtml = row.referral_code
      ? '<span class="ref-code">' + escHtml(row.referral_code) + '</span>'
      : '<span class="ref-empty">없음</span>';

    return `
      <tr>
        <td style="color:var(--text-light); font-size:13px;">${start + idx + 1}</td>
        <td class="td-name">${escHtml(row.name || '–')}</td>
        <td class="td-phone">${escHtml(row.phone || '–')}</td>
        <td>${escHtml(row.region || '–')}</td>
        <td>${escHtml(row.consult_type || '–')}</td>
        <td>${escHtml(row.install_target || '–')}</td>
        <td>${refHtml}</td>
        <td><span class="status-badge ${statusClass}">${escHtml(row.status || '신규')}</span></td>
        <td class="td-date">${date}</td>
        <td>
          <button class="action-btn btn-view" onclick="openDetail('${row.id}')">
            <i class="fas fa-eye"></i> 상세
          </button>
          <button class="action-btn btn-delete" onclick="deleteRow('${row.id}', '${escHtml(row.name || '')}')">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      </tr>
    `;
  }).join('');

  renderPagination();
}

// ---- 페이지네이션 ----
function renderPagination() {
  const total    = filtered.length;
  const pages    = Math.ceil(total / PER_PAGE);
  const paginationEl = document.getElementById('pagination');
  const pageBtns = document.getElementById('pageBtns');
  const info     = document.getElementById('paginationInfo');

  const start = (currentPage - 1) * PER_PAGE + 1;
  const end   = Math.min(currentPage * PER_PAGE, total);
  info.textContent = `${total}건 중 ${start}–${end}`;

  if (pages <= 1) {
    paginationEl.style.display = 'none';
    return;
  }

  paginationEl.style.display = 'flex';

  let html = '';
  html += `<button class="page-btn" ${currentPage===1 ? 'disabled':''} onclick="goPage(${currentPage-1})">
             <i class="fas fa-chevron-left"></i>
           </button>`;

  for (let i = 1; i <= pages; i++) {
    if (pages > 7) {
      if (i > 2 && i < pages - 1 && Math.abs(i - currentPage) > 2) {
        if (i === 3 || i === pages - 2) html += `<span style="padding: 0 4px; color:var(--text-light);">…</span>`;
        continue;
      }
    }
    html += `<button class="page-btn ${i===currentPage ? 'active':''}" onclick="goPage(${i})">${i}</button>`;
  }

  html += `<button class="page-btn" ${currentPage===pages ? 'disabled':''} onclick="goPage(${currentPage+1})">
             <i class="fas fa-chevron-right"></i>
           </button>`;

  pageBtns.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ---- 상세 모달 ----
function openDetail(id) {
  const row = allData.find(d => d.id === id);
  if (!row) return;

  const date = row.created_at
    ? new Date(row.created_at).toLocaleString('ko-KR')
    : '–';

  const statusOptions = ['신규','확인중','상담완료','설치완료']
    .map(s => `<option value="${s}" ${row.status===s ? 'selected':''}>${s}</option>`)
    .join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section-title">기본 정보</div>
    <div class="detail-grid">
      <div class="detail-item">
        <span class="detail-label">이름</span>
        <span class="detail-value">${escHtml(row.name || '–')}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">연락처</span>
        <span class="detail-value">${escHtml(row.phone || '–')}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">지역</span>
        <span class="detail-value ${row.region ? '' : 'empty'}">${escHtml(row.region || '미입력')}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">상담 유형</span>
        <span class="detail-value">${escHtml(row.consult_type || '–')}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">설치 대상</span>
        <span class="detail-value ${row.install_target ? '' : 'empty'}">${escHtml(row.install_target || '미선택')}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">사용 목적</span>
        <span class="detail-value ${row.purpose ? '' : 'empty'}">${escHtml(row.purpose || '미입력')}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">추천코드</span>
        <span class="detail-value ${row.referral_code ? '' : 'empty'}">${escHtml(row.referral_code || '없음')}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">신청일시</span>
        <span class="detail-value">${date}</span>
      </div>
      <div class="detail-item full">
        <span class="detail-label">문의 내용</span>
        <span class="detail-value ${row.message ? '' : 'empty'}">${escHtml(row.message || '없음')}</span>
      </div>
    </div>

    <div class="modal-section-title">상태 관리</div>
    <div class="status-select-row">
      <select class="status-select" id="modalStatusSelect">
        ${statusOptions}
      </select>
      <button class="btn-save-status" onclick="saveStatus('${row.id}')">
        <i class="fas fa-save"></i> 저장
      </button>
    </div>

    <div class="modal-section-title" style="margin-top:22px;">관리자 메모</div>
    <textarea class="memo-area" id="modalMemo">${escHtml(row.admin_memo || '')}</textarea>
    <button class="btn-save-status" style="width:100%;" onclick="saveMemo('${row.id}')">
      <i class="fas fa-sticky-note"></i> 메모 저장
    </button>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

// 상태 저장
async function saveStatus(id) {
  const newStatus = document.getElementById('modalStatusSelect').value;
  try {
    const res = await fetch('tables/consultations/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    if (!res.ok) throw new Error('PATCH error');
    const updated = await res.json();
    // 로컬 업데이트
    const idx = allData.findIndex(d => d.id === id);
    if (idx !== -1) allData[idx] = updated;
    updateSummary();
    applyFilter();
    closeModal();
    toast('상태가 업데이트되었습니다.', 'success');
  } catch(e) {
    toast('저장 중 오류가 발생했습니다.', 'error');
  }
}

// 메모 저장
async function saveMemo(id) {
  const memo = document.getElementById('modalMemo').value;
  try {
    const res = await fetch('tables/consultations/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_memo: memo })
    });
    if (!res.ok) throw new Error('PATCH error');
    const updated = await res.json();
    const idx = allData.findIndex(d => d.id === id);
    if (idx !== -1) allData[idx] = updated;
    toast('메모가 저장되었습니다.', 'success');
  } catch(e) {
    toast('저장 중 오류가 발생했습니다.', 'error');
  }
}

// 삭제
async function deleteRow(id, name) {
  if (!confirm(`"${name}" 님의 신청 내역을 삭제하시겠습니까?`)) return;
  try {
    const res = await fetch('tables/consultations/' + id, { method: 'DELETE' });
    if (!res.ok && res.status !== 204) throw new Error('DELETE error');
    allData = allData.filter(d => d.id !== id);
    updateSummary();
    applyFilter();
    toast('삭제되었습니다.', 'success');
  } catch(e) {
    toast('삭제 중 오류가 발생했습니다.', 'error');
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ---- Util ----
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showLoading(show) {
  document.getElementById('tableLoading').style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('tableWrap').style.display  = 'none';
    document.getElementById('tableEmpty').style.display = 'none';
    document.getElementById('pagination').style.display = 'none';
  }
}

function toast(msg, type) {
  const old = document.querySelector('.admin-toast');
  if (old) old.remove();

  const el = document.createElement('div');
  el.className = 'admin-toast';
  el.textContent = msg;
  Object.assign(el.style, {
    position:     'fixed',
    bottom:       '24px',
    right:        '24px',
    background:   type === 'error' ? '#e05a4b' : '#5f7152',
    color:        '#fff',
    padding:      '13px 22px',
    borderRadius: '999px',
    fontSize:     '14px',
    fontWeight:   '600',
    boxShadow:    '0 8px 24px rgba(0,0,0,0.18)',
    zIndex:       '9999',
    opacity:      '0',
    transition:   'opacity 0.25s ease',
    fontFamily:   'inherit'
  });
  document.body.appendChild(el);
  requestAnimationFrame(function() { el.style.opacity = '1'; });
  setTimeout(function() {
    el.style.opacity = '0';
    setTimeout(function() { el.remove(); }, 300);
  }, 3000);
}

// ---- Event Listeners ----
document.getElementById('refreshBtn').addEventListener('click', loadData);

document.getElementById('searchInput').addEventListener('input', function() {
  searchTerm = this.value.trim();
  applyFilter();
});

document.getElementById('statusFilter').addEventListener('change', function() {
  statusFilter = this.value;
  applyFilter();
});

document.getElementById('typeFilter').addEventListener('change', function() {
  typeFilter = this.value;
  applyFilter();
});

document.getElementById('modalClose').addEventListener('click', closeModal);

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ---- Init ----
loadData();

// 30초마다 자동 새로고침
setInterval(loadData, 30000);
</script>
