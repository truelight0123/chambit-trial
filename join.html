<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 | 참빛 미네랄 수소수기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .join-page {
      min-height: 100vh;
      background: linear-gradient(180deg, #f8f6f1 0%, #eef5ea 100%);
      padding: 140px 0 90px;
    }

    .join-wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    .join-card {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      padding: 40px 32px;
    }

    .join-top {
      text-align: center;
      margin-bottom: 28px;
    }

    .join-top h1 {
      font-size: 38px;
      line-height: 1.35;
      margin-bottom: 14px;
    }

    .join-top p {
      font-size: 17px;
      color: var(--text-light);
      line-height: 1.8;
    }

    .join-guide {
      background: var(--green-bg);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 26px;
    }

    .join-guide ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .join-guide li {
      display: flex;
      gap: 10px;
      color: var(--text-mid);
      line-height: 1.7;
    }

    .join-guide i {
      color: var(--green-mid);
      margin-top: 4px;
    }

    .join-form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .join-form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .join-form-group.full {
      grid-column: 1 / -1;
    }

    .join-form-group label {
      font-weight: 700;
      color: var(--text-dark);
    }

    .join-form-group input,
    .join-form-group textarea {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      background: #fff;
    }

    .join-form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .join-form-group input:focus,
    .join-form-group textarea:focus {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 4px rgba(95, 113, 82, 0.10);
    }

    .join-form-bottom {
      margin-top: 28px;
      text-align: center;
    }

    .join-help-text {
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
      text-align: center;
    }

    .join-result {
      display: none;
      margin-top: 24px;
      padding: 22px 20px;
      border-radius: 18px;
      background: rgba(24, 169, 87, 0.08);
      border: 1px solid rgba(24, 169, 87, 0.16);
    }

    .join-result h3 {
      font-size: 22px;
      margin-bottom: 14px;
      color: #128446;
    }

    .join-result-item {
      margin-bottom: 12px;
      color: var(--text-dark);
      line-height: 1.7;
      word-break: break-all;
    }

    .join-result-label {
      display: block;
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .join-result-value {
      font-size: 16px;
      font-weight: 600;
    }

    .join-result-link {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
    }

    .join-result-copy {
      margin-top: 12px;
    }

    @media (max-width: 760px) {
      .join-form-grid {
        grid-template-columns: 1fr;
      }

      .join-card {
        padding: 28px 20px;
      }

      .join-top h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <section class="join-page">
    <div class="container">
      <div class="join-wrap">
        <div class="join-card">
          <div class="join-top">
            <div class="section-label">MEMBERSHIP</div>
            <h1>회원가입 후<br>나만의 추천코드와 추천링크를 받으세요</h1>
            <p style="color: #ff0000; font-weight: bold; font-size: 16px; margin-top: 12px;">
            <span style="font-size: 32px;">👉</span> 추천한 고객이 구독을 유지하는 기간 동안, 매월 2,000원씩 돌려드립니다.
            </p>
          </div>

          <div class="join-guide">
            <ul>
              <li><i class="fas fa-check-circle"></i><span>회원가입 시 회원번호 자동 생성</span></li>
              <li><i class="fas fa-check-circle"></i><span>본인 전용 추천코드 자동 생성</span></li>
              <li><i class="fas fa-check-circle"></i><span>추천링크 자동 발급 후 공유 가능</span></li>
              <li><i class="fas fa-check-circle"></i><span>추천링크로 접속한 상담신청자는 추천코드가 자동 반영 가능</span></li>
            </ul>
          </div>

          <!-- 중요: form id 추가 -->
          <form id="joinForm">
            <div class="join-form-grid">
              <div class="join-form-group">
                <label for="name">이름</label>
                <input type="text" id="name" placeholder="이름을 입력하세요" required>
              </div>

              <div class="join-form-group">
                <label for="phone">연락처</label>
                <input type="text" id="phone" placeholder="010-0000-0000" required>
              </div>

              <div class="join-form-group full">
                <label for="address">주소</label>
                <input type="text" id="address" placeholder="주소를 입력하세요">
              </div>

              <div class="join-form-group full">
                <label for="referralCode">추천코드</label>
                <input type="text" id="referralCode" placeholder="추천받은 코드가 있으면 입력">
              </div>

              <div class="join-form-group full">
                <label for="memo">메모</label>
                <textarea id="memo" placeholder="추가 내용을 입력하세요"></textarea>
              </div>
            </div>

            <div class="join-form-bottom">
              <!-- 중요: submit 버튼으로 변경 -->
              <button type="submit" class="btn btn-green btn-lg" id="joinSubmitBtn">
                <span id="joinSubmitText"><i class="fas fa-user-plus"></i> 회원가입 완료</span>
                <span id="joinSubmitLoading" style="display:none;"><i class="fas fa-spinner fa-spin"></i> 처리 중...</span>
              </button>
            </div>

            <p class="join-help-text">
              회원가입 후 추천코드와 추천링크가 발급되면 지인에게 바로 공유할 수 있습니다.
            </p>
          </form>

          <!-- 중요: 결과 출력 영역 추가 -->
          <div id="joinResult" class="join-result">
            <h3>회원가입이 완료되었습니다</h3>

            <div class="join-result-item">
              <span class="join-result-label">회원번호</span>
              <div class="join-result-value" id="resultMemberId">-</div>
            </div>

            <div class="join-result-item">
              <span class="join-result-label">추천코드</span>
              <div class="join-result-value" id="resultRefCode">-</div>
            </div>

            <div class="join-result-item">
              <span class="join-result-label">추천링크</span>
              <input type="text" id="resultRefLink" class="join-result-link" readonly>
              <button type="button" class="btn btn-secondary join-result-copy" id="copyRefLinkBtn">
                <i class="fas fa-copy"></i>
                추천링크 복사
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

  <!-- 중요: join.js 연결 -->
  <script src="js/join.js"></script>
</body>
</html>
